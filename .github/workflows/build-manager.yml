name: 构建管理器

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: manager-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-manager:
    name: 测试并打包管理器
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 设置脚本执行权限
        run: chmod +x gradlew tests/test-a11yctl.sh tests/test-install-manager.sh

      - name: 运行模块回归测试
        run: |
          ./tests/test-a11yctl.sh
          ./tests/test-install-manager.sh

      - name: 测试并构建管理器
        run: ./gradlew --no-daemon clean :app:testDebugUnitTest :app:lintDebug :app:assembleDebug

      - name: 校验并打包 APK
        shell: bash
        run: |
          set -euo pipefail

          apk="app/build/outputs/apk/debug/app-debug.apk"
          module_zip="app/build/generated/magiskModuleAssets/accessibility-manager-module.zip"
          embedded_zip="$RUNNER_TEMP/accessibility-manager-module.zip"
          output="dist/accessibility-manager-miuix-debug.apk"

          unzip -t "$module_zip"
          unzip -p "$apk" assets/accessibility-manager-module.zip > "$embedded_zip"
          cmp "$module_zip" "$embedded_zip"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose "$apk"

          mkdir -p dist
          cp "$apk" "$output"
          sha256sum "$output"

      - name: 上传管理器 APK
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-manager-${{ github.run_number }}
          path: dist/accessibility-manager-miuix-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: 上传测试和 Lint 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manager-reports-${{ github.run_number }}
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/reports/lint-results-debug.*
          if-no-files-found: ignore
          retention-days: 14
